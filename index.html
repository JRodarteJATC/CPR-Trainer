<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPR Trainer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="pulse-dot" aria-hidden="true"></span>
      <h1>CPR Trainer</h1>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab" data-route="metronome">Metronome</button>
      <button class="tab" data-route="guide">Guide</button>
      <button class="tab" data-route="quiz">Quiz</button>
      <button class="tab" data-route="scenarios">Scenarios</button>
    </nav>
  </header>

  <div class="disclaimer">
    ⚠️ Practice &amp; study aid only — not a substitute for certified, hands-on CPR training.
    In a real emergency, call your local emergency number immediately.
  </div>

  <main id="view" class="view"><!-- active module renders here --></main>

  <footer class="footer">
    Adult Basic Life Support · based on AHA 2020 guidelines ·
    <a href="https://cpr.heart.org" target="_blank" rel="noopener">cpr.heart.org</a>
  </footer>

  <!-- Data -->
  <script src="data/quiz.js"></script>
  <script src="data/scenarios.js"></script>
  <!-- Modules -->
  <script src="js/metronome.js"></script>
  <script src="js/guide.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/scenarios.js"></script>
  <!-- Router (last) -->
  <script src="js/app.js"></script>
</body>
</html>
